# Render Blueprint — Fiber Liquidity Layer backend (Redis + web service on Render;
# Postgres is external — Neon, set DATABASE_URL manually).
# Deploy: Render Dashboard → New → Blueprint → pick this repo. See DEPLOYMENT.md.
#
# The FNN node is NOT hosted here. Set FIBER_RPC_URL / FIBER_WS_URL to a node
# reachable from Render (see DEPLOYMENT.md → "Where the Fiber node runs").

services:
  # Redis for BullMQ (rebalance worker). BullMQ requires the noeviction policy.
  - type: redis
    name: fiber-redis
    plan: free
    ipAllowList: [] # internal-only (reachable from the web service, not the internet)
    maxmemoryPolicy: noeviction

  - type: web
    name: fiber-backend
    runtime: node
    plan: free # NOTE: free web services SPIN DOWN on idle, which stops the poller,
    #             the WS gateway, and the rebalance worker. Use "starter" for always-on.
    region: oregon
    branch: main
    # Render's /usr/bin is read-only, so `corepack enable` fails (EROFS). Use npx to
    # fetch pnpm instead. Node is pinned to 22 via .node-version.
    buildCommand: npx --yes pnpm@9.15.9 install --frozen-lockfile && npx --yes pnpm@9.15.9 --filter backend run build
    startCommand: cd backend && node dist/main.js
    preDeployCommand: npx --yes pnpm@9.15.9 --filter backend exec prisma migrate deploy # migrations before traffic
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # your Neon Postgres URL: postgresql://…neon.tech/…?sslmode=require
      - key: REDIS_URL
        fromService:
          type: redis
          name: fiber-redis
          property: connectionString
      - key: RUN_WORKER_INLINE
        value: "true" # run the rebalance worker inside the web service (single instance)
      - key: POLL_INTERVAL_MS
        value: "15000"
      - key: FIBER_RPC_TIMEOUT_MS
        value: "10000"
      # ── Set these in the dashboard after the frontend + node exist ──
      - key: CORS_ORIGINS
        sync: false # your Vercel origin, e.g. https://fiber-liquidity.vercel.app
      - key: FIBER_RPC_URL
        sync: false # a node reachable from Render, e.g. https://node.example.com
      - key: FIBER_WS_URL
        sync: false # e.g. wss://node.example.com
      # Optional shared-secret gate. If you set this, the browser frontend needs a
      # server-side proxy to inject X-Dashboard-Secret (see DEPLOYMENT.md). Leave
      # unset for an open testnet demo.
      # - key: DASHBOARD_SECRET
      #   generateValue: true
